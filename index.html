<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pipeline | GymCred</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0f14; --surface: #13161e; --surface2: #1a1e28; --border: #252a38;
    --accent: #00e5a0; --accent2: #7c6af7; --text: #e8eaf0; --muted: #5a6070; --danger: #f25c5c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 40px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .nav-brand { display: flex; align-items: center; gap: 12px; }
  .nav-logo { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .nav-title { font-size: 16px; font-weight: 700; }
  .nav-sub { font-size: 11px; color: var(--muted); }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .file-badge { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 12px; }
  .file-badge.loaded { color: var(--accent); border-color: rgba(0,229,160,.25); }
  .bdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .file-badge.loaded .bdot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  main { max-width: 1340px; margin: 0 auto; padding: 32px 40px; }

  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px 20px; border-left: 3px solid transparent; transition: transform .2s; }
  .kpi:hover { transform: translateY(-2px); }
  .kpi-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
  .kpi-value { font-size: 22px; font-weight: 800; font-family: 'DM Mono', monospace; }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .card-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 20px; }

  .donut-wrap { display: flex; align-items: center; gap: 24px; }
  .donut-legend { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 0; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .legend-name { color: var(--text); font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .legend-pct { color: var(--muted); flex-shrink: 0; }

  .status-bar { margin-bottom: 16px; }
  .status-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .status-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 7px; }
  .status-count { font-size: 11px; color: var(--muted); }
  .status-val { font-size: 13px; font-family: 'DM Mono', monospace; font-weight: 600; }
  .bar-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width .8s cubic-bezier(.4,0,.2,1); }

  .filters { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .filter-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; font-family: 'Syne', sans-serif; }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { border-color: var(--accent); background: rgba(0,229,160,.1); color: var(--accent); }
  .filter-select { padding: 6px 12px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--surface2); color: var(--text); font-size: 12px; cursor: pointer; outline: none; font-family: 'Syne', sans-serif; }
  .clear-btn { padding: 5px 12px; border-radius: 8px; border: 1.5px solid rgba(242,92,92,.4); background: rgba(242,92,92,.08); color: var(--danger); font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Syne', sans-serif; }
  .filter-count { margin-left: auto; font-size: 12px; color: var(--muted); }
  .divider { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--surface2); border-bottom: 2px solid var(--border); }
  th { padding: 12px 16px; text-align: right; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }
  th.left { text-align: left; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 11px 16px; color: var(--text); text-align: right; }
  td.left { text-align: left; }
  td.mono { font-family: 'DM Mono', monospace; }
  td.muted { color: var(--muted); }
  td.purple { color: var(--accent2); font-weight: 600; font-family: 'DM Mono', monospace; }
  tfoot tr { background: var(--surface2); border-top: 2px solid var(--border); }
  tfoot td { font-weight: 700; font-family: 'DM Mono', monospace; }
  .empty-table { padding: 48px; text-align: center; color: var(--muted); font-size: 14px; }

  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }
  .pill-dot { width: 5px; height: 5px; border-radius: 50%; }

  @media (max-width: 768px) {
    nav { padding: 14px 20px; }
    main { padding: 20px 16px; }
    .charts { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-logo">💪</div>
    <div>
      <div class="nav-title">GymCred</div>
      <div class="nav-sub">Pipeline de Operações</div>
    </div>
  </div>
  <div class="nav-right">
    <div class="file-badge loaded">
      <div class="bdot"></div>
      <span>pipeline.xlsx</span>
    </div>
  </div>
</nav>

<main>
  <div id="dashboard"></div>
</main>

<script>
const COLORS = ['#00e5a0','#7c6af7','#f7a26a','#f25c5c','#38bdf8','#e879f9','#fb923c','#4ade80','#facc15','#60a5fa'];
const STATUS = {
  'aprovado':     { label:'Aprovado',     color:'#00e5a0', bg:'rgba(0,229,160,.12)' },
  'em aprovacao': { label:'Em Aprovação', color:'#f7a26a', bg:'rgba(247,162,106,.12)' },
  'em aprovação': { label:'Em Aprovação', color:'#f7a26a', bg:'rgba(247,162,106,.12)' },
  'desembolso':   { label:'Desembolso',   color:'#7c6af7', bg:'rgba(124,106,247,.12)' },
  'negado':       { label:'Negado',       color:'#f25c5c', bg:'rgba(242,92,92,.12)' },
};

const allData = [{"cliente":"Panobianco","parceiro":"Supreme","status":"aprovado","valor":1179125.5,"entrada":0.1,"liquido":1061212.95,"tcTotal":0.06,"tcLiq":0.055,"tc":62092.247074,"financiado":1128949.946809},{"cliente":"Spartacus","parceiro":"Supertech","status":"negado","valor":125004.0,"entrada":0.2,"liquido":100003.2,"tcTotal":0.07,"tcLiq":0.065,"tc":6989.470968,"financiado":107530.322581},{"cliente":"Skyfit","parceiro":"cimerian","status":"aprovado","valor":2350062.96,"entrada":0.2,"liquido":1880050.368,"tcTotal":0.065,"tcLiq":0.06,"tc":120644.943401,"financiado":2010749.056684},{"cliente":"Edu Dos santos","parceiro":"cimerian","status":"aprovado","valor":416833.56,"entrada":0.1,"liquido":375150.204,"tcTotal":0.055,"tcLiq":0.05,"tc":19849.217143,"financiado":396984.342857},{"cliente":"Mario","parceiro":"cimerian","status":"aprovado","valor":201920.0,"entrada":0.1,"liquido":181728.0,"tcTotal":0.055,"tcLiq":0.05,"tc":9615.238095,"financiado":192304.761905},{"cliente":"CT Saúde","parceiro":"starkstrong","status":"aprovado","valor":1234375.89,"entrada":0.5,"liquido":617187.945,"tcTotal":0.065,"tcLiq":0.06,"tc":39605.643529,"financiado":660094.058824},{"cliente":"Total Fit (Smart Fit)","parceiro":"total health","status":"aprovado","valor":1129916.0,"entrada":0.2,"liquido":903932.8,"tcTotal":0.065,"tcLiq":0.06,"tc":58006.382888,"financiado":966773.048128},{"cliente":"JPR","parceiro":"cimerian","status":"aprovado","valor":777355.45,"entrada":0.2,"liquido":621884.36,"tcTotal":0.065,"tcLiq":0.06,"tc":39907.017754,"financiado":665116.962567},{"cliente":"Move Fitness","parceiro":"Supertech","status":"desembolso","valor":674871.175,"entrada":0.2,"liquido":539896.94,"tcTotal":0.075,"tcLiq":0.07,"tc":40857.06573,"financiado":583672.367568},{"cliente":"CT Conexão","parceiro":"Metal Fitness","status":"desembolso","valor":300000.0,"entrada":0.0,"liquido":300000.0,"tcTotal":0.07,"tcLiq":0.065,"tc":20967.741935,"financiado":322580.645161},{"cliente":"Rafael Amarante Diniz","parceiro":"Drako","status":"aprovado","valor":2000000.0,"entrada":0.2,"liquido":1600000.0,"tcTotal":0.05,"tcLiq":0.045,"tc":80000.0,"financiado":1680000.0},{"cliente":"Pedro Ivo Almeida Silva Romão Gomes","parceiro":"Drako","status":"aprovado","valor":2000000.0,"entrada":0.2,"liquido":1600000.0,"tcTotal":0.05,"tcLiq":0.045,"tc":80000.0,"financiado":1680000.0},{"cliente":"Jean Carlos Silva de Souza","parceiro":"Drako","status":"aprovado","valor":2000000.0,"entrada":0.2,"liquido":1600000.0,"tcTotal":0.05,"tcLiq":0.045,"tc":80000.0,"financiado":1680000.0},{"cliente":"Isabella de Moraes Masuko/João Pedro Ribeiro Perez","parceiro":"Drako","status":"aprovado","valor":4000000.0,"entrada":0.2,"liquido":3200000.0,"tcTotal":0.05,"tcLiq":0.045,"tc":160000.0,"financiado":3360000.0},{"cliente":"Lucas Guimarães Nascimento","parceiro":"Drako","status":"aprovado","valor":2000000.0,"entrada":0.2,"liquido":1600000.0,"tcTotal":0.05,"tcLiq":0.045,"tc":80000.0,"financiado":1680000.0},{"cliente":"Juliana Silva Souza Lima","parceiro":"Drako","status":"aprovado","valor":3500000.0,"entrada":0.2,"liquido":2800000.0,"tcTotal":0.05,"tcLiq":0.045,"tc":140000.0,"financiado":2940000.0},{"cliente":"Danielly Rubbo","parceiro":"Drako","status":"aprovado","valor":3360000.0,"entrada":0.2,"liquido":2688000.0,"tcTotal":0.05,"tcLiq":0.045,"tc":134400.0,"financiado":2822400.0},{"cliente":"Rodrigo Otavio Gomes Correa","parceiro":"Drako","status":"aprovado","valor":2000000.0,"entrada":0.0,"liquido":2000000.0,"tcTotal":0.05,"tcLiq":0.045,"tc":100000.0,"financiado":2100000.0},{"cliente":"Samer Fakir","parceiro":"Drako","status":"aprovado","valor":0,"entrada":0,"liquido":0.0,"tcTotal":0.05,"tcLiq":0.045,"tc":0.0,"financiado":0.0},{"cliente":"Genio","parceiro":"Drako","status":"aprovado","valor":691400.0,"entrada":0.1,"liquido":622260.0,"tcTotal":0.05,"tcLiq":0.045,"tc":31113.0,"financiado":653373.0},{"cliente":"Patrícia de Cássia Moreira Pereira","parceiro":"Drako","status":"aprovado","valor":2000000.0,"entrada":0.2,"liquido":1600000.0,"tcTotal":0.05,"tcLiq":0.045,"tc":80000.0,"financiado":1680000.0},{"cliente":"Demerson Silva (Arapongas)","parceiro":"Drako","status":"negado","valor":2000000.0,"entrada":0.2,"liquido":1600000.0,"tcTotal":0.05,"tcLiq":0.045,"tc":80000.0,"financiado":1680000.0}];

let fStatus = 'all', fParceiro = 'all';

const fmt = v => (!v || isNaN(v)) ? '—' : new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}).format(v);
const pct = v => (!v || isNaN(v)) ? '—' : (v*100).toFixed(1)+'%';
const getFiltered = () => allData.filter(r => (fStatus==='all'||r.status===fStatus) && (fParceiro==='all'||r.parceiro===fParceiro));

function render() {
  const data = getFiltered();
  const statuses  = [...new Set(allData.map(r => r.status))];
  const parceiros = [...new Set(allData.map(r => r.parceiro))].sort();
  const sum = (arr, k) => arr.reduce((s,r) => s+r[k], 0);
  const tV=sum(data,'valor'), tL=sum(data,'liquido'), tF=sum(data,'financiado'), tTC=sum(data,'tc');

  // KPIs
  const kpis = [
    {label:'Operações',        value:data.length, sub:`de ${allData.length} no pipeline`, color:'#7c6af7'},
    {label:'Valor Total',      value:fmt(tV),     sub:'soma das operações',               color:'#f7a26a'},
    {label:'Valor Líquido',    value:fmt(tL),     sub:'após entrada',                     color:'#00e5a0'},
    {label:'Valor Financiado', value:fmt(tF),     sub:'total a financiar',                color:'#38bdf8'},
    {label:'TC Total (R$)',    value:fmt(tTC),    sub:'comissão gerada',                  color:'#e879f9'},
  ].map(k => `<div class="kpi" style="border-left-color:${k.color}">
    <div class="kpi-label">${k.label}</div>
    <div class="kpi-value">${k.value}</div>
    <div class="kpi-sub">${k.sub}</div>
  </div>`).join('');

  // Donut
  const gP = {}; allData.filter(r=>r.status!=='negado').forEach(r => { gP[r.parceiro] = (gP[r.parceiro]||0) + r.valor; });
  const eP = Object.entries(gP).sort((a,b) => b[1]-a[1]);
  const totP = eP.reduce((s,[,v]) => s+v, 0);
  let cum = 0; const sz=130, R=50, cx=sz/2, cy=sz/2;
  const paths = eP.map(([,v],i) => {
    const c=COLORS[i%COLORS.length], p=v/totP;
    const a1=cum*2*Math.PI-Math.PI/2, a2=(cum+p)*2*Math.PI-Math.PI/2;
    const d=`M${cx} ${cy} L${cx+R*Math.cos(a1)} ${cy+R*Math.sin(a1)} A${R} ${R} 0 ${p>.5?1:0} 1 ${cx+R*Math.cos(a2)} ${cy+R*Math.sin(a2)}Z`;
    cum += p; return `<path d="${d}" fill="${c}" opacity=".9"/>`;
  }).join('');
  const donutSVG = `<svg width="${sz}" height="${sz}" style="flex-shrink:0">${paths}
    <circle cx="${cx}" cy="${cy}" r="30" fill="#13161e"/>
    <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="14" font-weight="800" fill="#e8eaf0" font-family="Syne">${eP.length}</text>
    <text x="${cx}" y="${cy+18}" text-anchor="middle" font-size="8" fill="#5a6070" font-family="Syne">parceiros</text>
  </svg>`;
  const legendHTML = eP.slice(0,7).map(([n,v],i) => `<div class="legend-item">
    <div class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></div>
    <span class="legend-name" title="${n}">${n}</span>
    <span class="legend-pct">${totP>0?((v/totP)*100).toFixed(0):0}%</span>
  </div>`).join('');

  // Status bars — VALOR FINANCIADO
  const gS = {}; allData.forEach(r => {
    if (!gS[r.status]) gS[r.status] = { c:0, v:0 };
    gS[r.status].c++; gS[r.status].v += r.financiado;
  });
  const eS = Object.entries(gS).sort((a,b) => b[1].v-a[1].v);
  const maxV = Math.max(...eS.map(([,x]) => x.v));
  const statusHTML = eS.map(([st, info]) => {
    const cfg = STATUS[st] || { label:st, color:'#5a6070' };
    return `<div class="status-bar">
      <div class="status-bar-header">
        <div class="status-name">
          <span style="width:8px;height:8px;border-radius:50%;background:${cfg.color};display:inline-block"></span>
          ${cfg.label} <span class="status-count">${info.c} ops</span>
        </div>
        <div class="status-val" style="color:${cfg.color}">${fmt(info.v)}</div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${maxV>0?info.v/maxV*100:0}%;background:${cfg.color}"></div></div>
    </div>`;
  }).join('');

  // Filters
  const sBtns = ['all', ...statuses].map(s => {
    const lb = s === 'all' ? 'Todos' : (STATUS[s]?.label || s);
    return `<button class="filter-btn ${fStatus===s?'active':''}" onclick="sf('${s}')">${lb}</button>`;
  }).join('');
  const pOpts = ['<option value="all">Todos os parceiros</option>',
    ...parceiros.map(p => `<option value="${p}" ${fParceiro===p?'selected':''}>${p}</option>`)
  ].join('');
  const clearBtn = (fStatus!=='all'||fParceiro!=='all')
    ? `<button class="clear-btn" onclick="cf()">✕ Limpar</button>` : '';

  // Table
  const rows = data.map(r => {
    const cfg = STATUS[r.status] || { label:r.status, color:'#5a6070', bg:'rgba(90,96,112,.12)' };
    return `<tr>
      <td class="left" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.cliente}">${r.cliente}</td>
      <td class="left muted">${r.parceiro}</td>
      <td class="left"><span class="pill" style="color:${cfg.color};background:${cfg.bg}"><span class="pill-dot" style="background:${cfg.color}"></span>${cfg.label}</span></td>
      <td class="mono">${fmt(r.valor)}</td>
      <td class="muted">${pct(r.entrada)}</td>
      <td class="mono">${fmt(r.liquido)}</td>
      <td class="muted">${pct(r.tcTotal)}</td>
      <td class="muted">${pct(r.tcLiq)}</td>
      <td class="purple">${fmt(r.tc)}</td>
      <td class="mono">${fmt(r.financiado)}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="10" class="empty-table">Nenhuma operação com os filtros selecionados.</td></tr>`;

  const foot = data.length > 0 ? `<tr>
    <td class="left" colspan="3" style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-family:'Syne',sans-serif">Total · ${data.length} ops</td>
    <td>${fmt(tV)}</td><td></td><td>${fmt(tL)}</td><td colspan="2"></td>
    <td style="color:var(--accent2)">${fmt(tTC)}</td><td>${fmt(tF)}</td>
  </tr>` : '';

  document.getElementById('dashboard').innerHTML = `
    <div class="kpis">${kpis}</div>
    <div class="charts">
      <div class="card"><div class="card-title">Distribuição por Parceiro</div><div class="donut-wrap">${donutSVG}<div class="donut-legend">${legendHTML}</div></div></div>
      <div class="card"><div class="card-title">Breakdown por Status · Valor Financiado</div>${statusHTML}</div>
    </div>
    <div class="filters">
      <span class="filter-label">Filtrar</span>${sBtns}
      <div class="divider"></div>
      <select class="filter-select" onchange="sp(this.value)">${pOpts}</select>
      ${clearBtn}
      <span class="filter-count">${data.length} operações</span>
    </div>
    <div class="table-wrap"><div class="table-scroll">
      <table>
        <thead><tr>
          <th class="left">Cliente</th><th class="left">Parceiro</th><th class="left">Status</th>
          <th>Valor Bruto</th><th>Entrada</th><th>Valor Líquido</th>
          <th>TC Total</th><th>TC Líquida</th><th>TC (R$)</th><th>Valor Financiado</th>
        </tr></thead>
        <tbody>${rows}</tbody>
        <tfoot>${foot}</tfoot>
      </table>
    </div></div>`;
}

function sf(s) { fStatus = s; render(); }
function sp(p) { fParceiro = p; render(); }
function cf() { fStatus = 'all'; fParceiro = 'all'; render(); }

render();
</script>
</body>
</html>
