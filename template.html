<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GymCred | Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0f14;--s:#13161e;--s2:#1a1e28;--bd:#252a38;--g:#00e5a0;--v:#7c6af7;--o:#f7a26a;--r:#f25c5c;--t:#e8eaf0;--m:#5a6070;--b2:#38bdf8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 40px;border-bottom:1px solid var(--bd);background:var(--s);position:sticky;top:0;z-index:100;}
.nav-brand{display:flex;align-items:center;gap:12px;}
.nav-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--g),var(--v));display:flex;align-items:center;justify-content:center;font-size:18px;}
.nav-title{font-size:16px;font-weight:800;}
.nav-sub{font-size:11px;color:var(--m);}
.tabs{display:flex;gap:4px;background:var(--s2);border-radius:10px;padding:4px;}
.tab{padding:7px 24px;border-radius:7px;border:none;background:transparent;color:var(--m);font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s;}
.tab.active{background:var(--s);color:var(--t);box-shadow:0 1px 6px rgba(0,0,0,.4);}
main{max-width:1400px;margin:0 auto;padding:28px 40px;}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px;}
.kpi{background:var(--s);border:1px solid var(--bd);border-radius:14px;padding:20px 18px;border-top:3px solid transparent;transition:transform .2s,box-shadow .2s;cursor:default;}
.kpi:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.kpi-label{font-size:10px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.kpi-value{font-size:21px;font-weight:800;font-family:'DM Mono',monospace;line-height:1.1;}
.kpi-sub{font-size:11px;color:var(--m);margin-top:5px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px;}
.card{background:var(--s);border:1px solid var(--bd);border-radius:16px;padding:22px;}
.card-title{font-size:10px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.08em;margin-bottom:18px;}
.donut-wrap{display:flex;align-items:center;gap:20px;}
.donut-legend{display:flex;flex-direction:column;gap:8px;flex:1;min-width:0;}
.li{display:flex;align-items:center;gap:8px;font-size:12px;}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.ln{color:var(--t);font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lp{color:var(--m);flex-shrink:0;font-family:'DM Mono',monospace;font-size:11px;}
.sbar{margin-bottom:14px;}
.sbar-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.sbar-l{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
.sbar-c{font-size:10px;color:var(--m);}
.sbar-v{font-size:12px;font-family:'DM Mono',monospace;font-weight:600;}
.track{height:6px;background:var(--s2);border-radius:3px;overflow:hidden;}
.fill{height:100%;border-radius:3px;transition:width .9s cubic-bezier(.4,0,.2,1);}
.vp-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.vp-name{font-size:11px;font-weight:600;width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t);}
.vp-val{font-size:11px;font-family:'DM Mono',monospace;width:90px;text-align:right;flex-shrink:0;}
.vp-delta{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;flex-shrink:0;width:52px;text-align:center;}
.desembolso-banner{background:linear-gradient(135deg,rgba(124,106,247,.12),rgba(0,229,160,.06));border:1px solid rgba(124,106,247,.25);border-radius:16px;padding:18px 20px;margin-bottom:24px;}
.desembolso-header{font-size:10px;font-weight:700;color:var(--v);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}
.desembolso-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}
.desembolso-item{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.03);border-radius:10px;padding:12px 14px;border-left:3px solid var(--v);}
.di-info{flex:1;}
.di-name{font-size:13px;font-weight:700;}
.di-parceiro{font-size:11px;color:var(--m);}
.di-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:800;color:var(--v);}
.filters{background:var(--s);border:1px solid var(--bd);border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.fl{font-size:10px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.07em;}
.fb{padding:4px 12px;border-radius:20px;border:1.5px solid var(--bd);background:transparent;color:var(--m);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Syne',sans-serif;}
.fb:hover,.fb.active{border-color:var(--g);color:var(--g);background:rgba(0,229,160,.08);}
.fsel{padding:5px 10px;border:1.5px solid var(--bd);border-radius:8px;background:var(--s2);color:var(--t);font-size:11px;cursor:pointer;outline:none;font-family:'Syne',sans-serif;}
.fcl{padding:4px 10px;border-radius:8px;border:1.5px solid rgba(242,92,92,.3);background:rgba(242,92,92,.06);color:var(--r);font-size:11px;font-weight:600;cursor:pointer;font-family:'Syne',sans-serif;}
.fc{margin-left:auto;font-size:11px;color:var(--m);}
.dv{width:1px;height:16px;background:var(--bd);flex-shrink:0;}
.tw{background:var(--s);border:1px solid var(--bd);border-radius:16px;overflow:hidden;}
.ts{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:var(--s2);border-bottom:2px solid var(--bd);}
th{padding:11px 14px;text-align:right;font-size:10px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
th.l{text-align:left;}
tbody tr{border-bottom:1px solid var(--bd);transition:background .15s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--s2);}
td{padding:10px 14px;color:var(--t);text-align:right;}
td.l{text-align:left;}
td.mono{font-family:'DM Mono',monospace;}
td.mu{color:var(--m);}
td.pu{color:var(--v);font-weight:600;font-family:'DM Mono',monospace;}
tfoot tr{background:var(--s2);border-top:2px solid var(--bd);}
tfoot td{font-weight:700;font-family:'DM Mono',monospace;}
.et{padding:40px;text-align:center;color:var(--m);font-size:13px;}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.pdot{width:5px;height:5px;border-radius:50%;}
.prog-wrap{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
.prog-bar{width:56px;height:5px;background:var(--s2);border-radius:3px;overflow:hidden;flex-shrink:0;}
.prog-fill{height:100%;border-radius:3px;}
.prog-txt{font-size:11px;color:var(--m);font-family:'DM Mono',monospace;flex-shrink:0;}
.vp-inline{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.vp-main{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;}
.vp-tag{font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr);}.grid2{grid-template-columns:1fr;}nav{padding:12px 16px;}main{padding:16px;}}
</style>
</head>
<body>
<nav>
  <div class="nav-brand">
    <div class="nav-logo">💪</div>
    <div><div class="nav-title">GymCred</div><div class="nav-sub">Dashboard de Operações</div></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('pipeline',this)">📋 Pipeline</button>
    <button class="tab" onclick="showTab('carteira',this)">🏦 Carteira</button>
  </div>
</nav>
<main>
  <div id="tab-pipeline"></div>
  <div id="tab-carteira" style="display:none"></div>
</main>
<script>
const COLORS=['#00e5a0','#7c6af7','#f7a26a','#f25c5c','#38bdf8','#e879f9','#fb923c','#4ade80','#facc15','#60a5fa','#a78bfa','#34d399'];
const SP={'aprovado':{label:'Aprovado',color:'#00e5a0',bg:'rgba(0,229,160,.12)'},'em aprovacao':{label:'Em Aprovação',color:'#f7a26a',bg:'rgba(247,162,106,.12)'},'em aprovação':{label:'Em Aprovação',color:'#f7a26a',bg:'rgba(247,162,106,.12)'},'desembolso':{label:'Desembolso',color:'#7c6af7',bg:'rgba(124,106,247,.12)'},'negado':{label:'Negado',color:'#f25c5c',bg:'rgba(242,92,92,.12)'}};
const fmt=v=>(!v||isNaN(v))?'—':new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}).format(v);
const pct=v=>(!v||isNaN(v))?'—':(v*100).toFixed(1)+'%';
const fmtD=s=>s?new Date(s+'T12:00:00').toLocaleDateString('pt-BR'):'—';

const PIPELINE=__PIPELINE_DATA__;
const CARTEIRA=__CARTEIRA_DATA__;

let pF={status:'all',parceiro:'all'},cF={parceiro:'all'};

function donutCard(entries,valFn){
  const items=entries.filter(([,v])=>valFn(v)>0);
  const tot=items.reduce((s,[,v])=>s+valFn(v),0);
  let cum=0;const sz=120,R=46,cx=sz/2,cy=sz/2;
  const paths=items.map(([,v],i)=>{const c=COLORS[i%COLORS.length],p=valFn(v)/tot;const a1=cum*2*Math.PI-Math.PI/2,a2=(cum+p)*2*Math.PI-Math.PI/2;const d=`M${cx} ${cy} L${cx+R*Math.cos(a1)} ${cy+R*Math.sin(a1)} A${R} ${R} 0 ${p>.5?1:0} 1 ${cx+R*Math.cos(a2)} ${cy+R*Math.sin(a2)}Z`;cum+=p;return`<path d="${d}" fill="${c}" opacity=".9"/>`;}).join('');
  const svg=`<svg width="${sz}" height="${sz}" style="flex-shrink:0">${paths}<circle cx="${cx}" cy="${cy}" r="28" fill="#13161e"/><text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="13" font-weight="800" fill="#e8eaf0" font-family="Syne">${items.length}</text></svg>`;
  const legend=items.slice(0,9).map(([n,v],i)=>`<div class="li"><div class="ld" style="background:${COLORS[i%COLORS.length]}"></div><span class="ln" title="${n}">${n}</span><span class="lp">${tot>0?((valFn(v)/tot)*100).toFixed(0):0}%</span></div>`).join('');
  return`<div class="donut-wrap">${svg}<div class="donut-legend">${legend}</div></div>`;
}

function showTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-pipeline').style.display=tab==='pipeline'?'block':'none';
  document.getElementById('tab-carteira').style.display=tab==='carteira'?'block':'none';
  tab==='pipeline'?renderPipeline():renderCarteira();
}

function renderPipeline(){
  const data=PIPELINE.filter(r=>(pF.status==='all'||r.status===pF.status)&&(pF.parceiro==='all'||r.parceiro===pF.parceiro));
  const active=PIPELINE.filter(r=>r.status!=='negado');
  const desembolso=PIPELINE.filter(r=>r.status==='desembolso');
  const sum=(arr,k)=>arr.reduce((s,r)=>s+r[k],0);
  const kpis=[{l:'Operações Ativas',v:active.length,s:`${PIPELINE.filter(r=>r.status==='negado').length} negadas`,c:'#7c6af7'},{l:'Valor Total',v:fmt(sum(active,'valor')),s:'excl. negadas',c:'#f7a26a'},{l:'A Desembolsar',v:fmt(sum(desembolso,'financiado')),s:`${desembolso.length} ops prontas`,c:'#7c6af7'},{l:'Total Financiado',v:fmt(sum(active,'financiado')),s:'valor a financiar',c:'#38bdf8'},{l:'TC Total (R$)',v:fmt(sum(active,'tc')),s:'comissão gerada',c:'#e879f9'}].map(k=>`<div class="kpi" style="border-top-color:${k.c}"><div class="kpi-label">${k.l}</div><div class="kpi-value">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join('');
  const banner=desembolso.length?`<div class="desembolso-banner"><div class="desembolso-header">⚡ Em Desembolso — Saída Iminente</div><div class="desembolso-grid">${desembolso.map(r=>`<div class="desembolso-item"><div class="di-info"><div class="di-name">${r.cliente}</div><div class="di-parceiro">${r.parceiro}</div></div><div class="di-val">${fmt(r.financiado)}</div></div>`).join('')}</div></div>`:'';
  const gP={};active.forEach(r=>{gP[r.parceiro]=(gP[r.parceiro]||0)+r.valor;});
  const eP=Object.entries(gP).sort((a,b)=>b[1]-a[1]);
  const gS={};PIPELINE.forEach(r=>{if(!gS[r.status])gS[r.status]={c:0,v:0};gS[r.status].c++;gS[r.status].v+=r.financiado;});
  const eS=Object.entries(gS).sort((a,b)=>b[1].v-a[1].v);
  const mxS=Math.max(...eS.map(([,x])=>x.v));
  const sbars=eS.map(([st,info])=>{const cfg=SP[st]||{label:st,color:'#5a6070'};return`<div class="sbar"><div class="sbar-h"><div class="sbar-l"><span style="width:8px;height:8px;border-radius:50%;background:${cfg.color};display:inline-block"></span>${cfg.label}<span class="sbar-c">${info.c} ops</span></div><div class="sbar-v" style="color:${cfg.color}">${fmt(info.v)}</div></div><div class="track"><div class="fill" style="width:${mxS>0?info.v/mxS*100:0}%;background:${cfg.color}"></div></div></div>`;}).join('');
  const statuses=[...new Set(PIPELINE.map(r=>r.status))];
  const parceiros=[...new Set(PIPELINE.map(r=>r.parceiro))].sort();
  const sBtns=['all',...statuses].map(s=>`<button class="fb ${pF.status===s?'active':''}" onclick="pff('status','${s}')">${s==='all'?'Todos':(SP[s]?.label||s)}</button>`).join('');
  const pOpts=['<option value="all">Todos os parceiros</option>',...parceiros.map(p=>`<option value="${p}" ${pF.parceiro===p?'selected':''}>${p}</option>`)].join('');
  const clr=(pF.status!=='all'||pF.parceiro!=='all')?`<button class="fcl" onclick="pfc()">✕ Limpar</button>`:'';
  const rows=data.map(r=>{const cfg=SP[r.status]||{label:r.status,color:'#5a6070',bg:'rgba(90,96,112,.12)'};const pCfg={'Alta':{c:'#f25c5c'},'Média':{c:'#f7a26a'},'Baixa':{c:'#00e5a0'}}[r.prioridade];const sem=pCfg?`<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:${pCfg.c}"><span style="width:7px;height:7px;border-radius:50%;background:${pCfg.c};display:inline-block"></span>${r.prioridade}</span>`:'<span style="color:var(--m);font-size:11px">—</span>';return`<tr><td class="l" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.cliente}">${r.cliente}</td><td class="l mu">${r.parceiro}</td><td class="l"><span class="pill" style="color:${cfg.color};background:${cfg.bg}"><span class="pdot" style="background:${cfg.color}"></span>${cfg.label}</span></td><td class="mono">${fmt(r.valor)}</td><td class="mu">${pct(r.entrada)}</td><td class="mono">${fmt(r.financiado)}</td><td class="pu">${fmt(r.tc)}</td><td class="l">${sem}</td><td class="mu">${r.dataDesembolso?fmtD(r.dataDesembolso):'—'}</td></tr>`;}).join('')||`<tr><td colspan="9" class="et">Nenhuma operação encontrada.</td></tr>`;
  const tV=sum(data,'valor'),tF=sum(data,'financiado'),tTC=sum(data,'tc');
  const foot=data.length?`<tr><td class="l" colspan="3" style="color:var(--m);font-size:10px;text-transform:uppercase;font-family:'Syne',sans-serif">Total · ${data.length} ops</td><td>${fmt(tV)}</td><td></td><td>${fmt(tF)}</td><td style="color:var(--v)">${fmt(tTC)}</td><td colspan="2"></td></tr>`:'';
  document.getElementById('tab-pipeline').innerHTML=`<div class="kpis">${kpis}</div>${banner}<div class="grid2"><div class="card"><div class="card-title">Distribuição por Parceiro</div>${donutCard(eP,v=>v)}</div><div class="card"><div class="card-title">Breakdown por Status · Valor Financiado</div>${sbars}</div></div><div class="filters"><span class="fl">Filtrar</span>${sBtns}<div class="dv"></div><select class="fsel" onchange="pff('parceiro',this.value)">${pOpts}</select>${clr}<span class="fc">${data.length} operações</span></div><div class="tw"><div class="ts"><table><thead><tr><th class="l">Cliente</th><th class="l">Parceiro</th><th class="l">Status</th><th>Valor Bruto</th><th>Entrada</th><th>Val. Financiado</th><th>TC (R$)</th><th class="l">Prioridade</th><th>Dt. Desembolso</th></tr></thead><tbody>${rows}</tbody><tfoot>${foot}</tfoot></table></div></div>`;
}

function renderCarteira(){
  const data=CARTEIRA.filter(r=>cF.parceiro==='all'||r.parceiro===cF.parceiro).sort((a,b)=>b.vp-a.vp);
  const totalValor=CARTEIRA.reduce((s,r)=>s+r.valor,0);
  const totalVP=CARTEIRA.reduce((s,r)=>s+r.vp,0);
  const vpDelta=((totalVP/totalValor-1)*100).toFixed(1);
  const pipeline_ativo=PIPELINE.filter(r=>!['negado'].includes(r.status)).reduce((s,r)=>s+r.financiado,0);
  const desembolso_prox=PIPELINE.filter(r=>r.status==='desembolso').reduce((s,r)=>s+r.financiado,0);
  const kpis=[{l:'Valor de Emissão',v:fmt(totalValor),s:`${CARTEIRA.length} operações ativas`,c:'#f7a26a'},{l:'Valor Presente (VP)',v:fmt(totalVP),s:`${vpDelta>0?'+':''}${vpDelta}% vs emissão`,c:'#00e5a0'},{l:'Pipeline Aprovado',v:fmt(pipeline_ativo),s:'aguardando desembolso',c:'#7c6af7'},{l:'Próx. Desembolso',v:fmt(desembolso_prox),s:'em fase final',c:'#38bdf8'},{l:'Taxa Média',v:((CARTEIRA.reduce((s,r)=>s+r.taxa,0)/CARTEIRA.length)*100).toFixed(2)+'%',s:'a.m. ponderada',c:'#e879f9'}].map(k=>`<div class="kpi" style="border-top-color:${k.c}"><div class="kpi-label">${k.l}</div><div class="kpi-value">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join('');
  const gP={};CARTEIRA.forEach(r=>{gP[r.parceiro]=(gP[r.parceiro]||0)+r.vp;});
  const eP=Object.entries(gP).sort((a,b)=>b[1]-a[1]);
  const top10=[...CARTEIRA].sort((a,b)=>b.valor-a.valor).slice(0,10);
  const maxVal=top10[0]?.valor||1;
  const vpChart=top10.map(r=>{const emitPct=(r.valor/maxVal*100).toFixed(1);const vpPct=(r.vp/maxVal*100).toFixed(1);const isPos=r.vpVsValor>=0;const deltaColor=isPos?'#00e5a0':'#f7a26a';const deltaBg=isPos?'rgba(0,229,160,.12)':'rgba(247,162,106,.12)';return`<div class="vp-bar-row"><div class="vp-name" title="${r.cliente}">${r.cliente}</div><div style="flex:1"><div style="height:5px;background:rgba(255,255,255,.06);border-radius:3px;margin-bottom:3px;overflow:hidden"><div style="width:${emitPct}%;height:100%;background:#252a38;border-radius:3px"></div></div><div style="height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden"><div style="width:${vpPct}%;height:100%;background:${isPos?'#00e5a0':'#f7a26a'};border-radius:3px;opacity:.8"></div></div></div><div class="vp-val" style="color:var(--t)">${fmt(r.vp)}</div><div class="vp-delta" style="background:${deltaBg};color:${deltaColor}">${isPos?'+':''}${r.vpVsValor}%</div></div>`;}).join('');
  const gPrazo={};CARTEIRA.forEach(r=>{const k=r.prazo+'m';if(!gPrazo[k])gPrazo[k]={c:0,v:0};gPrazo[k].c++;gPrazo[k].v+=r.vp;});
  const ePrazo=Object.entries(gPrazo).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
  const mxP=Math.max(...ePrazo.map(([,x])=>x.v));
  const prazoColors={'24m':'#00e5a0','36m':'#38bdf8','48m':'#7c6af7'};
  const prazoBars=ePrazo.map(([k,info])=>{const c=prazoColors[k]||'#f7a26a';return`<div class="sbar"><div class="sbar-h"><div class="sbar-l"><span style="width:8px;height:8px;border-radius:50%;background:${c};display:inline-block"></span>Prazo ${k}<span class="sbar-c">${info.c} ops</span></div><div class="sbar-v" style="color:${c}">${fmt(info.v)}</div></div><div class="track"><div class="fill" style="width:${mxP>0?info.v/mxP*100:0}%;background:${c}"></div></div></div>`;}).join('');
  const parceiros=[...new Set(CARTEIRA.map(r=>r.parceiro))].sort();
  const pOpts=['<option value="all">Todos os parceiros</option>',...parceiros.map(p=>`<option value="${p}" ${cF.parceiro===p?'selected':''}>${p}</option>`)].join('');
  const clr=cF.parceiro!=='all'?`<button class="fcl" onclick="cfc()">✕ Limpar</button>`:'';
  const rows=data.map(r=>{const isPos=r.vpVsValor>=0;const dColor=isPos?'#00e5a0':'#f7a26a';const dBg=isPos?'rgba(0,229,160,.1)':'rgba(247,162,106,.1)';const prog=Math.min(100,(r.mesesAtivos/r.prazo*100)).toFixed(0);return`<tr><td class="l" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.cliente}">${r.cliente}</td><td class="l mu">${r.parceiro}</td><td class="l mu" style="font-size:11px">${r.localidade}</td><td class="mono">${fmt(r.valor)}</td><td><div class="vp-inline"><span class="vp-main" style="color:${dColor}">${fmt(r.vp)}</span><span class="vp-tag" style="background:${dBg};color:${dColor}">${isPos?'+':''}${r.vpVsValor}%</span></div></td><td class="mu">${(r.taxa*100).toFixed(1)}% a.m.</td><td class="mu">${r.prazo}m</td><td><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${prog}%;background:var(--g)"></div></div><span class="prog-txt">${r.mesesRestantes}m rest.</span></div></td><td class="mu">${fmtD(r.dataEmissao)}</td></tr>`;}).join('')||`<tr><td colspan="9" class="et">Nenhuma operação encontrada.</td></tr>`;
  const tV=data.reduce((s,r)=>s+r.valor,0),tVP=data.reduce((s,r)=>s+r.vp,0);
  const foot=data.length?`<tr><td class="l" colspan="3" style="color:var(--m);font-size:10px;text-transform:uppercase;font-family:'Syne',sans-serif">Total · ${data.length} ops</td><td>${fmt(tV)}</td><td style="color:var(--g)">${fmt(tVP)}</td><td colspan="4"></td></tr>`:'';
  document.getElementById('tab-carteira').innerHTML=`<div class="kpis">${kpis}</div><div class="grid2"><div class="card"><div class="card-title">Concentração por Parceiro · VP</div>${donutCard(eP,v=>v)}</div><div class="card"><div class="card-title">Distribuição por Prazo · VP Total</div>${prazoBars}</div></div><div class="card" style="margin-bottom:24px"><div class="card-title">VP vs Valor de Emissão · Top 10 operações</div><div style="display:flex;gap:20px;margin-bottom:12px;font-size:11px;color:var(--m)"><span style="display:flex;align-items:center;gap:6px"><span style="width:20px;height:5px;background:#252a38;border-radius:2px;display:inline-block"></span>Valor Emissão</span><span style="display:flex;align-items:center;gap:6px"><span style="width:20px;height:5px;background:#00e5a0;border-radius:2px;display:inline-block;opacity:.8"></span>VP (verde = crescendo · laranja = amortizando)</span></div>${vpChart}</div><div class="filters"><span class="fl">Filtrar</span><div class="dv"></div><select class="fsel" onchange="cff('parceiro',this.value)">${pOpts}</select>${clr}<span class="fc">${data.length} operações</span></div><div class="tw"><div class="ts"><table><thead><tr><th class="l">Cliente</th><th class="l">Parceiro</th><th class="l">Localidade</th><th>Valor Emissão</th><th>VP</th><th>Taxa</th><th>Prazo</th><th>Progresso</th><th>Emissão</th></tr></thead><tbody>${rows}</tbody><tfoot>${foot}</tfoot></table></div></div>`;
}

function pff(k,v){pF[k]=v;renderPipeline();}
function pfc(){pF={status:'all',parceiro:'all'};renderPipeline();}
function cff(k,v){cF[k]=v;renderCarteira();}
function cfc(){cF={parceiro:'all'};renderCarteira();}
renderPipeline();
</script>
</body>
</html>
